apiVersion: agents.selamy.dev/v1alpha1
kind: RequiredSecrets
metadata:
  agent: career-steward-agent

secrets:
  - id: openrouter-api-key
    requiredFor: boot
    provider: external-secret-manager
    remoteKey: openrouter-api-key
    injectAs:
      env: OPENROUTER_API_KEY
    verifies:
      kind: http-authenticated-request
      description: Model provider accepts the key.

  - id: telegram-bot-token
    requiredFor: boot
    provider: external-secret-manager
    remoteKey: telegram-bot-token
    injectAs:
      env: TELEGRAM_BOT_TOKEN
    verifies:
      kind: bot-get-me
      description: Telegram bot token resolves to the expected bot.

  - id: telegram-allowed-users
    requiredFor: boot
    provider: external-secret-manager
    remoteKey: telegram-allowed-users
    injectAs:
      env: TELEGRAM_ALLOWED_USERS
    verifies:
      kind: static-allowlist
      description: Primary user Telegram id is present.

  - id: github-token
    requiredFor: github-workflows
    provider: external-secret-manager
    remoteKey: github-token
    injectAs:
      env: GH_TOKEN
    scopes:
      - repo
      - workflow
      - packages.read
    verifies:
      kind: gh-auth-status

  - id: ghcr-pull-secret
    requiredFor: boot
    provider: external-secret-manager
    remoteKey: agent-ghcr-pull-dockerconfigjson
    injectAs:
      kubernetesSecretType: kubernetes.io/dockerconfigjson
      secretName: ghcr-pull
    verifies:
      kind: image-pull

  - id: google-oauth-client
    requiredFor: google-workspace
    provider: external-secret-manager
    remoteKey: google-client-secret
    injectAs:
      mountPath: /etc/hermes/google/google_client_secret.json
    manualPrerequisite:
      description: OAuth client must be created and authorized for Gmail, Calendar, Drive, and Docs scopes.
    verifies:
      kind: google-oauth-client-loads

  - id: google-user-token
    requiredFor: google-workspace
    provider: external-secret-manager
    remoteKey: google-user-token
    injectAs:
      mountPath: /opt/data/google_token_fixed.json
    manualPrerequisite:
      description: Interactive user consent may be required before this token exists.
    verifies:
      kind: gmail-profile-read

  - id: unipile-api-key
    requiredFor: linkedin-and-whatsapp
    provider: external-secret-manager
    remoteKey: unipile-api-key
    injectAs:
      env: UNIPILE_API_KEY
    verifies:
      kind: unipile-account-list

  - id: unipile-linkedin-account
    requiredFor: linkedin
    provider: external-secret-manager
    remoteKey: unipile-linkedin-account-id
    injectAs:
      env: UNIPILE_LINKEDIN_ACCOUNT_ID
    manualPrerequisite:
      description: LinkedIn account must be connected in Unipile.
    verifies:
      kind: linkedin-inbox-list

  - id: unipile-whatsapp-account
    requiredFor: whatsapp
    provider: external-secret-manager
    remoteKey: unipile-whatsapp-account-id
    injectAs:
      env: UNIPILE_WHATSAPP_ACCOUNT_ID
    manualPrerequisite:
      description: WhatsApp account must be connected in Unipile.
    verifies:
      kind: whatsapp-chat-read

  - id: codex-auth
    requiredFor: boot
    provider: external-secret-manager
    remoteKey: codex-credentials
    injectAs:
      mountPath: /etc/hermes/codex-auth/credentials.json
    verifies:
      kind: auth-json-parse

  - id: ssh-keys
    requiredFor: gitops-and-remote-support
    provider: external-secret-manager
    remoteKey: agent-ssh-keys
    injectAs:
      mountPath: /root/.ssh
    verifies:
      kind: ssh-key-permissions

