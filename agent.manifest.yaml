apiVersion: agents.selamy.dev/v1alpha1
kind: DeclarativeAgent
x-versioning:
  schemaVersion: 1.0.0
  compatibility:
    backwardCompatibleWithin: v1alpha1
    breakingChangesRequire:
      - schemaVersionMajorBump
      - migrationPlan
      - changelogEntry
  unknownFields: reject
  deprecationPolicy:
    minSupportedMinorVersions: 2
    removalRequiresMigration: true
metadata:
  name: career-steward-agent
  owner: user
  description: >
    A career-steward personal assistant agent for career stewardship,
    communications triage, interview prep, content-inbound support,
    and approval-gated external action.

identity:
  displayName: Career Steward
  role: Personal assistant and career steward
  mandate: >
    Steward the principal's career and communications by triaging
    opportunities, preserving context, preparing grounded artifacts,
    and requesting approval before external side effects.
  principals:
    - id: primary-user
      relationship: acts-for
      approvalAuthority: true

runtime:
  engine: hermes-agent
  image:
    repository: nousresearch/hermes-agent
    tag: main
    tagPolicy: pinned-digest
  model:
    provider: openai-codex-compatible
    baseUrlSecretRef: optional-model-base-url
    apiKeySecretRef: openrouter-api-key
    defaultModel: gpt-5.5
    summaryModel: z-ai/glm-5.1
  resources:
    requests:
      cpu: 100m
      memory: 1536Mi
    limits:
      memory: 3Gi
  state:
    pvc:
      mountPath: /opt/data
      storageClass: standard-rwo
      size: 8Gi
    mutableZones:
      - /opt/data/**
    immutableZones:
      - /etc/hermes/**
      - /opt/scripts/**
      - /usr/local/bin/**
  rollout:
    reconciler: argocd
    restartPolicy: boot-config-checksum

capabilities:
  toolsets:
    - hermes-cli
    - terminal
    - file
    - web
    - browser
  connectors:
    googleWorkspace:
      enabled: true
      capabilities:
        - gmail.read
        - gmail.draft
        - gmail.send-after-approval
        - calendar.read
        - calendar.respond-after-approval
        - drive.docs.read
        - drive.docs.create-after-approval
      secrets:
        - google-oauth-client
        - google-user-token
    telegram:
      enabled: true
      capabilities:
        - notify-user
        - receive-user-directives
        - coordinate-agent-thread
      secrets:
        - telegram-bot-token
        - telegram-allowed-users
    linkedin:
      enabled: true
      provider: unipile
      capabilities:
        - inbox.read
        - profile.read
        - jobs.search
        - messages.send-after-approval
      secrets:
        - unipile-api-key
        - unipile-linkedin-account
    whatsapp:
      enabled: true
      provider: unipile
      capabilities:
        - group-messages.read
        - source-lineaged-digest.write
      sendMessages: false
      secrets:
        - unipile-api-key
        - unipile-whatsapp-account
    github:
      enabled: true
      capabilities:
        - repo.clone
        - branch.create
        - pr.open
        - pr.merge-after-ci
      secrets:
        - github-token
        - ghcr-pull-secret
    kubernetes:
      enabled: true
      capabilities:
        - self-describe
        - observe-rollout
      writeAccess: reconciler-only

knowledge:
  wiki:
    path: /opt/data/wiki
    mode: read-write
  memory:
    enabled: true
    userProfileEnabled: true
    maxMemoryChars: 12000
    maxUserProfileChars: 8000
  careerGraph:
    files:
      - /opt/data/wiki/concepts/career-pipeline-overview.md
      - /opt/data/wiki/concepts/**
  generatedArtifacts:
    roots:
      - /opt/data/wiki
      - /opt/data/work

workflows:
  - ref: workflows/career-steward.yaml
  - ref: workflows/whatsapp-intake.yaml
  - ref: workflows/content-inbound.yaml
  - ref: workflows/state-maintenance.yaml

policies:
  approvalGates:
    ref: policies/approval-gates.yaml
  privacy:
    rawPrivateTranscriptPublicUse: forbidden
    rawThirdPartyChatPublicUse: forbidden
    personalDataPublicUse: forbidden-unless-explicitly-approved
    localPathsPublicUse: forbidden
    credentialsPublicUse: forbidden
  writeBoundary:
    liveRuntimeMutation: forbidden
    repoOwnedFilesMutableInPod: false
    changesToRuntime: pull-request-required

schedules:
  careerEmailCheck:
    workflow: career-steward
    kind: cron
    expr: "0 * * * *"
    sideEffects:
      - telegram.notify-user
      - wiki.write
    externalSend: approval-required
  whatsappIntake:
    workflow: whatsapp-intake
    kind: cron
    expr: "*/30 * * * *"
    sideEffects:
      - wiki.write
      - telegram.notify-user
    externalSend: forbidden
  stateRetention:
    workflow: state-maintenance
    kind: cron
    expr: "37 */6 * * *"
  pvcPruning:
    workflow: state-maintenance
    kind: cron
    expr: "53 2 * * *"

featureFlags:
  provider: openfeature-flagd
  flags:
    career-steward.ops.career-email-check-enabled:
      type: boolean
      default: true
    career-steward.ops.whatsapp-intake-enabled:
      type: boolean
      default: true
    career-steward.runtime.busy-input-mode:
      type: enum
      values: [interrupt, queue]
      default: interrupt
    fleet.verbosity:
      type: enum
      values: [quiet, normal, verbose]
      default: normal

observability:
  logs:
    format: json
  telemetry:
    standard: opentelemetry
    requiredSpans:
      - workflow.run
      - connector.call
      - approval.requested
      - external.side_effect
      - artifact.generated

validation:
  requiredChecks:
    - schema-valid
    - secrets-declared-not-committed
    - approval-gates-present
    - external-side-effects-gated
    - private-data-redaction
    - immutable-runtime-boundary
    - generated-kubernetes-renders
